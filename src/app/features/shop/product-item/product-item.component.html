@if (product) {
  <mat-card appearance="raised" routerLink="/shop/{{product.id}}" class="product-card">
    <mat-card-title>

    </mat-card-title>
    <div class="card-image-container">
      <img src="{{product.pictureUrl}}" class="rounded-t-lg" alt="image of {{product.name}}">
    </div>
    <mat-card-content>
      <h2 class="text-sm font-semibold uppercase">{{product.name | truncateText}}</h2>
      <p class="font-light">{{product.price * exchangeRate | currency:'PHP'}}</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-stroked-button class="w-full">
        <mat-icon>add_shopping_cart</mat-icon>
        Add to cart
      </button>
    </mat-card-actions>
  </mat-card>
}
